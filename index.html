<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 投資組合健檢中心</title>
    <!-- 引入 Tailwind CSS 以美化純 HTML 畫面 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 隱藏/顯示視圖的平滑過渡設定 */
        .view-section { display: none; opacity: 0; transition: opacity 0.3s ease; }
        .view-section.active { display: block; opacity: 1; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4 font-sans text-slate-100">

    <div class="w-full max-w-md bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 overflow-hidden relative">
        
        <!-- 全域載入中遮罩 -->
        <div id="loadingOverlay" class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex-col items-center justify-center hidden">
            <svg class="animate-spin h-10 w-10 text-emerald-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p id="loadingText" class="text-emerald-400 font-medium">處理中...</p>
        </div>

        <!-- 錯誤提示列 -->
        <div id="errorBanner" class="hidden bg-red-900/50 border-l-4 border-red-500 p-4 text-red-200 text-sm">
            <p id="errorText">發生錯誤</p>
        </div>
        <div id="successBanner" class="hidden bg-emerald-900/50 border-l-4 border-emerald-500 p-4 text-emerald-200 text-sm">
            <p id="successText">操作成功</p>
        </div>

        <div class="p-8">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-500/20 text-emerald-400 mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                </div>
                <h1 class="text-2xl font-bold text-white">投資組合健檢中心</h1>
                <p id="subTitle" class="text-slate-400 text-sm mt-2">請登入以繼續</p>
            </div>

            <!-- ================= [登入畫面] ================= -->
            <div id="loginView" class="view-section active">
                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">電子信箱</label>
                        <input type="email" id="loginEmail" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500" placeholder="you@example.com">
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-sm font-medium text-slate-300">密碼</label>
                            <button type="button" onclick="switchView('forgotView')" class="text-sm text-emerald-400 hover:text-emerald-300 transition-colors">忘記密碼？</button>
                        </div>
                        <input type="password" id="loginPassword" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500" placeholder="••••••••">
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium py-2.5 rounded-lg transition-colors mt-2">
                        登入
                    </button>
                </form>

                <div class="mt-6 relative flex items-center justify-center">
                    <div class="border-t border-slate-700 w-full absolute"></div>
                    <span class="bg-slate-800 px-3 text-sm text-slate-400 relative">或使用</span>
                </div>

                <button id="googleLoginBtn" class="mt-6 w-full flex items-center justify-center gap-3 bg-white hover:bg-gray-100 text-gray-800 font-medium py-2.5 rounded-lg transition-colors">
                    <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Google 登入
                </button>

                <p class="mt-8 text-center text-sm text-slate-400">
                    還沒有帳號嗎？ 
                    <button onclick="switchView('registerView')" class="text-emerald-400 hover:text-emerald-300 font-medium">註冊帳號</button>
                </p>
            </div>

            <!-- ================= [註冊畫面] ================= -->
            <div id="registerView" class="view-section">
                <form id="registerForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">電子信箱</label>
                        <input type="email" id="regEmail" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-emerald-500" placeholder="you@example.com">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">密碼 (至少 6 個字元)</label>
                        <input type="password" id="regPassword" required minlength="6" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-emerald-500" placeholder="••••••••">
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium py-2.5 rounded-lg transition-colors mt-2">
                        建立帳號
                    </button>
                </form>

                <div class="mt-6 relative flex items-center justify-center">
                    <div class="border-t border-slate-700 w-full absolute"></div>
                    <span class="bg-slate-800 px-3 text-sm text-slate-400 relative">或使用</span>
                </div>

                <button id="googleRegBtn" class="mt-6 w-full flex items-center justify-center gap-3 bg-white hover:bg-gray-100 text-gray-800 font-medium py-2.5 rounded-lg transition-colors">
                    <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Google 快速註冊
                </button>

                <p class="mt-8 text-center text-sm text-slate-400">
                    已經有帳號了？ 
                    <button onclick="switchView('loginView')" class="text-emerald-400 hover:text-emerald-300 font-medium">返回登入</button>
                </p>
            </div>

            <!-- ================= [忘記密碼畫面] ================= -->
            <div id="forgotView" class="view-section">
                <p class="text-sm text-slate-300 mb-6 text-center">請輸入您註冊時使用的電子信箱，我們將發送重設密碼的連結給您。</p>
                <form id="forgotForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">電子信箱</label>
                        <input type="email" id="resetEmail" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-emerald-500" placeholder="you@example.com">
                    </div>
                    <button type="submit" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-medium py-2.5 rounded-lg transition-colors mt-2">
                        發送重設信件
                    </button>
                </form>
                <p class="mt-8 text-center text-sm text-slate-400">
                    記起密碼了？ 
                    <button onclick="switchView('loginView')" class="text-emerald-400 hover:text-emerald-300 font-medium">返回登入</button>
                </p>
            </div>

            <!-- ================= [登入成功/驗證畫面] ================= -->
            <div id="successView" class="view-section text-center">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-emerald-500/20 text-emerald-400 mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                </div>
                <h2 class="text-2xl font-bold text-white mb-2">登入成功！</h2>
                <p id="welcomeEmail" class="text-slate-400 mb-8">user@example.com</p>
                
                <button id="enterAppBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition-colors shadow-lg shadow-emerald-900/50 flex items-center justify-center gap-2">
                    進入投資組合健檢中心
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>

                <button id="logoutBtn" class="mt-6 text-sm text-slate-400 hover:text-white transition-colors">
                    登出帳號
                </button>
            </div>

        </div>
    </div>

    <!-- ================= [Firebase 邏輯] ================= -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            sendEmailVerification, 
            sendPasswordResetEmail, 
            signInWithPopup, 
            GoogleAuthProvider, 
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Firebase Configuration (使用者提供)
        const firebaseConfig = {
            apiKey: "AIzaSyAXPLpJWn4_gDYW2Bv0pfc3WcwOZtSleq0",
            authDomain: "test-79c7f.firebaseapp.com",
            projectId: "test-79c7f",
            storageBucket: "test-79c7f.firebasestorage.app",
            messagingSenderId: "1062032640680",
            appId: "1:1062032640680:web:13a23c2588c6c94314109d",
            measurementId: "G-SL57G1GMJF"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        // 畫面切換與 UI 控制邏輯
        window.switchView = (viewId) => {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            
            // 更新副標題
            const subTitle = document.getElementById('subTitle');
            if(viewId === 'loginView') subTitle.textContent = '請登入以繼續';
            else if(viewId === 'registerView') subTitle.textContent = '建立您的專屬帳號';
            else if(viewId === 'forgotView') subTitle.textContent = '重設您的密碼';
            else if(viewId === 'successView') subTitle.textContent = '歡迎回來';
            
            clearMessages();
        };

        const setLoading = (isLoading, text = '處理中...') => {
            const overlay = document.getElementById('loadingOverlay');
            document.getElementById('loadingText').textContent = text;
            if(isLoading) overlay.classList.replace('hidden', 'flex');
            else overlay.classList.replace('flex', 'hidden');
        };

        const showError = (msg) => {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorBanner').classList.remove('hidden');
            setTimeout(() => document.getElementById('errorBanner').classList.add('hidden'), 5000);
        };

        const showSuccess = (msg) => {
            document.getElementById('successText').textContent = msg;
            document.getElementById('successBanner').classList.remove('hidden');
            setTimeout(() => document.getElementById('successBanner').classList.add('hidden'), 5000);
        };

        const clearMessages = () => {
            document.getElementById('errorBanner').classList.add('hidden');
            document.getElementById('successBanner').classList.add('hidden');
        };

        // 翻譯 Firebase 錯誤代碼
        const translateError = (error) => {
            const code = error.code;
            if(code === 'auth/invalid-email') return '電子信箱格式錯誤。';
            if(code === 'auth/user-disabled') return '此帳號已被停用。';
            if(code === 'auth/user-not-found' || code === 'auth/invalid-credential') return '帳號或密碼錯誤。';
            if(code === 'auth/wrong-password') return '密碼錯誤。';
            if(code === 'auth/email-already-in-use') return '此電子信箱已被註冊。';
            if(code === 'auth/weak-password') return '密碼強度太弱，請至少輸入 6 個字元。';
            if(code === 'auth/popup-closed-by-user') return 'Google 登入視窗已關閉。';
            return `發生錯誤 (${code})，請稍後再試。`;
        };

        // 監聽登入狀態
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // 如果是信箱註冊但未驗證
                if (user.providerData[0].providerId === 'password' && !user.emailVerified) {
                    showError("請先至您的電子信箱點擊驗證連結，再進行登入。");
                    signOut(auth);
                    window.switchView('loginView');
                    return;
                }
                document.getElementById('welcomeEmail').textContent = user.email;
                window.switchView('successView');
            } else {
                window.switchView('loginView');
            }
        });

        // 1. 信箱登入
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            setLoading(true, '登入中...');
            try {
                await signInWithEmailAndPassword(auth, email, password);
                // 成功後會觸發 onAuthStateChanged
            } catch (error) {
                showError(translateError(error));
            } finally {
                setLoading(false);
            }
        });

        // 2. 信箱註冊
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            setLoading(true, '建立帳號中...');
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                // 發送驗證信
                await sendEmailVerification(userCredential.user);
                await signOut(auth); // 註冊後先登出，強制要求驗證
                showSuccess("註冊成功！我們已發送驗證信至您的信箱，請查收並驗證後再登入。");
                window.switchView('loginView');
            } catch (error) {
                showError(translateError(error));
            } finally {
                setLoading(false);
            }
        });

        // 3. 忘記密碼
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            
            setLoading(true, '發送信件中...');
            try {
                await sendPasswordResetEmail(auth, email);
                showSuccess("密碼重設信件已發送！請檢查您的收件匣。");
                window.switchView('loginView');
            } catch (error) {
                showError(translateError(error));
            } finally {
                setLoading(false);
            }
        });

        // 4. Google 登入/註冊 共用函式
        const handleGoogleAuth = async () => {
            setLoading(true, '正在呼叫 Google 驗證...');
            try {
                await signInWithPopup(auth, googleProvider);
                // 成功後會觸發 onAuthStateChanged 跳轉
            } catch (error) {
                showError(translateError(error));
            } finally {
                setLoading(false);
            }
        };

        document.getElementById('googleLoginBtn').addEventListener('click', handleGoogleAuth);
        document.getElementById('googleRegBtn').addEventListener('click', handleGoogleAuth);

        // 5. 進入系統按鈕
        document.getElementById('enterAppBtn').addEventListener('click', () => {
            setLoading(true, '正在載入系統模組...');
            // 實務上這裡會是 window.location.href = '/app.html' 或載入 React 元件
            setTimeout(() => {
                alert("即將為您導向至【投資組合健檢中心 App.jsx】介面！\n\n(此為展示跳轉行為，實務中可配置路由)");
                setLoading(false);
            }, 1000);
        });

        // 6. 登出
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            setLoading(true, '登出中...');
            try {
                await signOut(auth);
            } catch (error) {
                showError("登出失敗");
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
